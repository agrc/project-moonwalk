name: Pull Request Events
on: pull_request

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test-unit-python-jobs:
    name: Jobs unit tests 🐍
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ./jobs/setup.py

      - name: 📥 Download extra dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev

      - name: 🏗 Install module
        working-directory: ./jobs
        run: pip install .[tests]

      - name: 🧶 Lint
        working-directory: ./jobs
        run: ruff check --output-format=github .

      - name: 🧪 Run tests
        working-directory: ./jobs
        run: pytest

  test-unit-python-functions:
    name: Functions unit tests 🐍
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ./functions/python/requirements.txt

      - name: 📥 Download extra dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev
          pip install ruff pytest

      - name: 🏗 Install dependencies
        working-directory: ./functions/python
        run: |
          pip install -r requirements.txt
          pip install -r requirements.dev.txt

      - name: 🧶 Lint
        working-directory: ./functions/python
        run: ruff check --output-format=github .

      - name: 🧪 Run tests
        working-directory: ./functions/python
        run: pytest

  test-unit-ui:
    name: Unit tests ⎔
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v6

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: 📥 Download dependencies
        run: pnpm install

      - name: 🔍 Lint
        run: pnpm run lint

      - name: ✅ Check types
        run: pnpm run check

      - name: 🧪 Run tests
        run: pnpm test

  deploy-firebase-preview:
    name: Firebase preview
    runs-on: ubuntu-latest
    needs: [test-unit-ui, test-unit-python-functions]
    if: ${{ github.event.sender.type == 'User' && github.head_ref != 'dev' }}
    environment:
      name: dev

    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: 🚀 Deploy Firebase project to preview
        uses: ./.github/actions/deploy-firebase
        with:
          identity_provider: ${{ secrets.IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ secrets.PROJECT_ID }}
          firebase_config: ${{ secrets.FIREBASE_CONFIG }}
          preview: 'yes'
          build_command: pnpm run build --mode dev
          repo_token: ${{ secrets.GITHUB_TOKEN }}
